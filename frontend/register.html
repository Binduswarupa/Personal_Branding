<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - BrandBoost AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="bg-animated"></div>
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <a href="index.html" class="navbar-brand-custom" style="font-size:1.6rem"><i class="fab fa-linkedin"></i> BrandBoost AI</a>
                <h1 style="margin-top:1.5rem">Create Account</h1>
                <p>Start your LinkedIn growth journey</p>
            </div>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label-custom">Full Name</label>
                    <input type="text" id="name" class="form-control-custom" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom">Email Address</label>
                    <input type="email" id="email" class="form-control-custom" placeholder="john@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom">Career Goal</label>
                    <input type="text" id="careerGoal" class="form-control-custom" placeholder="e.g., Software Engineer at FAANG">
                </div>
                <div class="mb-3">
                    <label class="form-label-custom">Password</label>
                    <input type="password" id="password" class="form-control-custom" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control-custom" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn-primary-custom w-100" style="justify-content:center;padding:14px">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            <div class="auth-divider"><span>or</span></div>
            <p style="text-align:center;color:var(--text-secondary)">
                Already have an account? <a href="login.html" style="font-weight:600">Sign in</a>
            </p>
        </div>
    </div>
    <button class="theme-toggle" id="themeToggle" style="position:fixed;top:1rem;right:1rem"><i class="fas fa-sun"></i></button>
    <script src="js/auth.js"></script>
    <script>redirectIfAuth();</script>
</body>
</html>
