<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - BrandBoost AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="bg-animated"></div>
    <div class="auth-container">
        <div class="auth-card glass-card">
            <div class="auth-header">
                <a href="index.html" class="navbar-brand-custom" style="font-size:1.6rem"><i class="fab fa-linkedin"></i> BrandBoost AI</a>
                <h1 style="margin-top:1.5rem">Welcome Back</h1>
                <p>Sign in to your account</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label-custom">Email Address</label>
                    <input type="email" id="email" class="form-control-custom" placeholder="Enter your email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label-custom">Password</label>
                    <input type="password" id="password" class="form-control-custom" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary-custom w-100" style="justify-content:center;padding:14px">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            <div class="auth-divider"><span>or</span></div>
            <p style="text-align:center;color:var(--text-secondary)">
                Don't have an account? <a href="register.html" style="font-weight:600">Create one</a>
            </p>
        </div>
    </div>
    <button class="theme-toggle" id="themeToggle" style="position:fixed;top:1rem;right:1rem"><i class="fas fa-sun"></i></button>
    <script src="js/auth.js"></script>
    <script>redirectIfAuth();</script>
</body>
</html>
